# ============================================
# PRODUCTION PROFILE — application-prod.properties
# Activate with: SPRING_PROFILES_ACTIVE=prod
# ============================================

spring.application.name=EduAI
server.port=${PORT:8080}

# --- Database (use PostgreSQL in production) ---
spring.datasource.url=${DATABASE_URL}
spring.datasource.driverClassName=org.postgresql.Driver
spring.datasource.username=${DB_USERNAME}
spring.datasource.password=${DB_PASSWORD}
spring.jpa.database-platform=org.hibernate.dialect.PostgreSQLDialect
spring.jpa.hibernate.ddl-auto=validate
spring.h2.console.enabled=false

# --- Connection Pool (HikariCP) ---
spring.datasource.hikari.maximum-pool-size=10
spring.datasource.hikari.minimum-idle=5
spring.datasource.hikari.idle-timeout=30000
spring.datasource.hikari.connection-timeout=20000

# --- AI Configuration ---
gemini.api.key=${GEMINI_API_KEY}
gemini.base-url=https://generativelanguage.googleapis.com/v1beta/openai
gemini.model=gemini-2.0-flash
gemini.embedding-model=embedding-001

# --- File Upload ---
spring.servlet.multipart.max-file-size=50MB
spring.servlet.multipart.max-request-size=50MB

# --- Uploads Directory (use absolute path in production) ---
upload.dir=${UPLOAD_DIR:/app/uploads/}

# --- Disable OpenAI Auto-Configuration ---
spring.autoconfigure.exclude=org.springframework.ai.autoconfigure.openai.OpenAiAutoConfiguration

# --- JWT (REQUIRED — set via environment variable) ---
jwt.secret=${JWT_SECRET}

# --- CORS (set to your deployed frontend URL) ---
cors.allowed-origins=${CORS_ALLOWED_ORIGINS}

# --- Admin Seed (REQUIRED — set via environment variables) ---
admin.seed.username=${ADMIN_USERNAME}
admin.seed.email=${ADMIN_EMAIL}
admin.seed.password=${ADMIN_PASSWORD}
admin.seed.fullName=${ADMIN_FULLNAME:System Administrator}

# --- Logging ---
logging.level.root=WARN
logging.level.com.eduai=INFO
logging.level.org.springframework.security=WARN

# --- Disable GraphiQL in production ---
spring.graphql.graphiql.enabled=false
