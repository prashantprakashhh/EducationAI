# Database
spring.datasource.url=jdbc:postgresql://localhost:5432/eduai
spring.datasource.username=postgres
spring.datasource.password=admin
spring.jpa.hibernate.ddl-auto=update

# GraphQL
spring.graphql.graphiql.enabled=true
spring.graphql.schema.printer.enabled=true

# Show detailed GraphQL errors (disable in production)
spring.graphql.schema.introspection.enabled=true

# AI Configuration - Use environment variable for security
# Set OPENAI_API_KEY environment variable before running the application
# Example: export OPENAI_API_KEY=sk-proj-xxx
spring.ai.openai.api-key=${OPENAI_API_KEY:}
spring.ai.openai.chat.options.model=gpt-4o-mini
spring.ai.openai.chat.options.temperature=0.7

# Logging - Enable debug for AI issues
logging.level.com.eduai=DEBUG
logging.level.org.springframework.ai=DEBUG

# JWT Configuration
jwt.secret=YourJWTSecretKeyHere
jwt.expiration=86400000